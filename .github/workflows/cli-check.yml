name: CLI Check

on:
  push:
  pull_request:

jobs:
  cli-help:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.x'

      - name: Verify CLI entrypoint
        run: python3 fdbcs.py --help
